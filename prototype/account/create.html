<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | XRPD Fraud Recovery</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .trust-strip {
            background-color: #222;
            padding: 8px;
            text-align: center;
            font-size: 14px;
            color: #ccc;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 8px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #3A95FF;
        }
        p {
            color: #ccc;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn-primary {
            background: #3A95FF;
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary:hover {
            background: #1a7ac4;
        }
        .link {
            color: #3A95FF;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="trust-strip">
        ⚠️ We never ask for seed phrase. No guaranteed recovery. Beware of upfront fees.
    </div>

    <div class="container">
        <h1>Create your account</h1>
        <p>To save your report and access your dashboard, please create an account.</p>
        <input type="email" placeholder="Email address" />
        <input type="password" placeholder="Password" />
        <a href="../dashboard/index.html" class="btn-primary">Create Account & Continue</a>
        <a href="../dashboard/index.html" class="link">Already have an account? Log in</a>
    </div>

    <div class="footer">
        <a href="../index.html" style="color: #666;">← Back to home</a>
    </div>
</body>
</html>
