<!DOCTYPE html>
<html lang="en">
<head>...</head>
<body>
    <div class="trust-strip">...</div>
    <div class="container">
        <h2>Do you suspect your device was compromised (for example, a suspicious download, remote access, or a fake wallet app)?</h2>
        <div class="options">
            <label class="option"><input type="radio" name="answer" value="computer"> Yes, a computer</label>
            <label class="option"><input type="radio" name="answer" value="phone"> Yes, a phone</label>
            <label class="option"><input type="radio" name="answer" value="maybe"> Maybe</label>
            <label class="option"><input type="radio" name="answer" value="no"> No</label>
        </div>
        <div class="nav-buttons">
            <a href="A3.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">See Results →</button>
        </div>
    </div>
    <script>
        function getUrlParams() { return new URLSearchParams(window.location.search); }
        function goNext() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) { alert('Please select an option.'); return; }
            const params = getUrlParams();
            params.set('device_compromised', selected.value);
            window.location.href = '../results.html?' + params.toString();
        }
    </script>
</body>
</html>
