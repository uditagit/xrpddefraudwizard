<!DOCTYPE html>
<html lang="en">
<head>...</head>
<body>
    <div class="trust-strip">...</div>
    <div class="container">
        <h2>Where did you buy the token—on a DEX, a CEX, through a presale, or are you not sure?</h2>
        <div class="options">
            <label class="option"><input type="radio" name="answer" value="dex"> DEX (swap)</label>
            <label class="option"><input type="radio" name="answer" value="cex"> CEX (exchange)</label>
            <label class="option"><input type="radio" name="answer" value="presale"> Presale / private sale</label>
            <label class="option"><input type="radio" name="answer" value="unknown"> Not sure</label>
        </div>
        <div class="nav-buttons">
            <a href="../step-7.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">Next →</button>
        </div>
    </div>
    <script>
        function getUrlParams() { return new URLSearchParams(window.location.search); }
        function goNext() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) { alert('Please select an option.'); return; }
            const params = getUrlParams();
            params.set('bought_where', selected.value);
            window.location.href = 'C2.html?' + params.toString();
        }
    </script>
</body>
</html>
