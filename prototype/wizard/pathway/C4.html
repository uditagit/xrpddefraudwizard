<!DOCTYPE html>
<html lang="en">
<head>...</head>
<body>
    <div class="trust-strip">...</div>
    <div class="container">
        <h2>Where did you first learn about this project?</h2>
        <div class="options">
            <label class="option"><input type="radio" name="answer" value="telegram_discord"> Telegram or Discord</label>
            <label class="option"><input type="radio" name="answer" value="x"> X / Twitter</label>
            <label class="option"><input type="radio" name="answer" value="youtube_tiktok"> YouTube or TikTok</label>
            <label class="option"><input type="radio" name="answer" value="website"> A website</label>
            <label class="option"><input type="radio" name="answer" value="referral"> Someone I know</label>
            <label class="option"><input type="radio" name="answer" value="unknown"> Not sure</label>
        </div>
        <div class="nav-buttons">
            <a href="C3.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">See Results →</button>
        </div>
    </div>
    <script>
        function getUrlParams() { return new URLSearchParams(window.location.search); }
        function goNext() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) { alert('Please select an option.'); return; }
            const params = getUrlParams();
            params.set('promoted_via', selected.value);
            window.location.href = '../results.html?' + params.toString();
        }
    </script>
</body>
</html>
