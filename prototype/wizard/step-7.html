<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 7 - Time Window | XRPD Fraud Recovery</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .trust-strip { background-color: #222; padding: 8px; text-align: center; font-size: 14px; color: #ccc; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .progress { display: flex; justify-content: space-between; margin: 20px 0 10px; font-size: 14px; color: #888; }
        .progress .active { color: #3A95FF; font-weight: bold; }
        .progress-bar { background-color: #333; height: 6px; border-radius: 3px; margin-bottom: 30px; }
        .progress-fill { background-color: #3A95FF; height: 6px; width: 100%; border-radius: 3px; }
        h2 { font-size: 24px; margin-bottom: 10px; }
        .subtitle { color: #aaa; margin-bottom: 20px; }
        .option { display: block; margin-bottom: 12px; padding: 10px; background-color: #111; border: 1px solid #333; border-radius: 6px; cursor: pointer; }
        .option:hover { border-color: #3A95FF; }
        .option input { margin-right: 12px; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn { padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-block; }
        .btn-outline { background: transparent; border: 1px solid #3A95FF; color: #3A95FF; }
        .btn-primary { background: #3A95FF; color: #000; border: none; }
    </style>
</head>
<body>
    <div class="trust-strip">⚠️ We never ask for seed phrase. No guaranteed recovery. Beware of upfront fees.</div>
    <div class="container">
        <div class="progress">
            <span class="active">1. Incident</span><span class="active">2. Chain</span><span class="active">3. Wallet</span><span class="active">4. Country</span><span class="active">5. Loss</span><span class="active">6. Police</span><span class="active">7. Time</span>
        </div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <h2>About when did this happen?</h2>
        <div class="subtitle">This helps us surface the most relevant transactions.</div>
        <div class="options">
            <label class="option"><input type="radio" name="time" value="24h"> Within the last 24 hours</label>
            <label class="option"><input type="radio" name="time" value="1_3d"> 1-3 days ago</label>
            <label class="option"><input type="radio" name="time" value="4_7d"> 4-7 days ago</label>
            <label class="option"><input type="radio" name="time" value="8d_plus"> More than a week ago</label>
            <label class="option"><input type="radio" name="time" value="unknown"> Not sure</label>
        </div>
        <div class="nav-buttons">
            <a href="step-6.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">Next →</button>
        </div>
    </div>
    <script>
        function getUrlParams() {
            return new URLSearchParams(window.location.search);
        }
        function buildBaseUrl() {
            const params = getUrlParams();
            return `?incident=${params.get('incident') || 'unknown'}&chain=${params.get('chain') || 'unknown'}&wallet=${params.get('wallet') || 'skipped'}&country=${params.get('country') || 'unknown'}&loss=${params.get('loss') || 'unknown'}&police=${params.get('police') || 'unknown'}&case_number=${params.get('case_number') || ''}`;
        }
        function goNext() {
            const selected = document.querySelector('input[name="time"]:checked');
            if (!selected) { alert('Please select an option.'); return; }
            const base = buildBaseUrl();
            const timeParam = `&time=${selected.value}`;
            const incident = getUrlParams().get('incident') || 'unknown';
            // Route to first pathway question based on incident type
            let nextPage = '';
            switch(incident) {
                case 'A': nextPage = 'pathway/A1.html'; break;
                case 'B': nextPage = 'pathway/B1.html'; break;
                case 'C': nextPage = 'pathway/C1.html'; break;
                case 'D': nextPage = 'pathway/D1.html'; break;
                case 'E': nextPage = 'pathway/E1.html'; break;
                default: nextPage = 'results.html'; break;
            }
            window.location.href = nextPage + base + timeParam;
        }
    </script>
</body>
</html>
