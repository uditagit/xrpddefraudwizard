<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathway A1 | XRPD Fraud Recovery</title>
    <style>/* same styles as before, copy from step-1.html */</style>
</head>
<body>
    <div class="trust-strip">⚠️ We never ask for seed phrase. No guaranteed recovery. Beware of upfront fees.</div>
    <div class="container">
        <h2>Are there any assets remaining in the affected wallet right now?</h2>
        <div class="options">
            <label class="option"><input type="radio" name="answer" value="yes"> Yes</label>
            <label class="option"><input type="radio" name="answer" value="no"> No</label>
            <label class="option"><input type="radio" name="answer" value="unknown"> Not sure</label>
        </div>
        <div class="nav-buttons">
            <a href="../step-7.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">Next →</button>
        </div>
    </div>
    <script>
        function getUrlParams() { return new URLSearchParams(window.location.search); }
        function goNext() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) { alert('Please select an option.'); return; }
            const params = getUrlParams();
            params.set('assets_remaining', selected.value);
            window.location.href = 'A2.html?' + params.toString();
        }
    </script>
</body>
</html>
