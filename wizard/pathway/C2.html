<!DOCTYPE html>
<html lang="en">
<head>...</head>
<body>
    <div class="trust-strip">...</div>
    <div class="container">
        <h2>Which issue best matches what you are seeing right now?</h2>
        <div class="options">
            <label class="option"><input type="radio" name="answer" value="liquidity_removed"> Liquidity was removed and price collapsed</label>
            <label class="option"><input type="radio" name="answer" value="cannot_sell"> I cannot sell (honeypot / blocked)</label>
            <label class="option"><input type="radio" name="answer" value="trading_halted"> Trading was halted or contract changed</label>
            <label class="option"><input type="radio" name="answer" value="team_gone"> The team disappeared</label>
            <label class="option"><input type="radio" name="answer" value="unknown"> Not sure</label>
        </div>
        <div class="nav-buttons">
            <a href="C1.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">Next →</button>
        </div>
    </div>
    <script>
        function getUrlParams() { return new URLSearchParams(window.location.search); }
        function goNext() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) { alert('Please select an option.'); return; }
            const params = getUrlParams();
            params.set('rug_symptom', selected.value);
            window.location.href = 'C3.html?' + params.toString();
        }
    </script>
</body>
</html>
