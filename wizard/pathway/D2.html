<!DOCTYPE html>
<html lang="en">
<head>...</head>
<body>
    <div class="trust-strip">...</div>
    <div class="container">
        <h2>Were funds withdrawn to an external wallet address?</h2>
        <div class="options">
            <label class="option"><input type="radio" name="answer" value="yes"> Yes</label>
            <label class="option"><input type="radio" name="answer" value="no"> No</label>
            <label class="option"><input type="radio" name="answer" value="unknown"> Not sure</label>
        </div>
        <div class="nav-buttons">
            <a href="D1.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">Next →</button>
        </div>
    </div>
    <script>
        function getUrlParams() { return new URLSearchParams(window.location.search); }
        function goNext() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) { alert('Please select an option.'); return; }
            const params = getUrlParams();
            params.set('external_withdrawals', selected.value);
            window.location.href = 'D3.html?' + params.toString();
        }
    </script>
</body>
</html>
