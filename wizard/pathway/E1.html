<!DOCTYPE html>
<html lang="en">
<head>...</head>
<body>
    <div class="trust-strip">...</div>
    <div class="container">
        <h2>Which of these sounds closest to what happened?</h2>
        <div class="options">
            <label class="option"><input type="radio" name="answer" value="A"> My wallet was drained / unauthorized transactions</label>
            <label class="option"><input type="radio" name="answer" value="B"> I sent funds to someone (scam)</label>
            <label class="option"><input type="radio" name="answer" value="C"> I bought a token that rugged or I cannot sell</label>
            <label class="option"><input type="radio" name="answer" value="D"> My exchange account was taken over</label>
            <label class="option"><input type="radio" name="answer" value="E"> Still not sure</label>
        </div>
        <div class="nav-buttons">
            <a href="../step-7.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">Next →</button>
        </div>
    </div>
    <script>
        function getUrlParams() { return new URLSearchParams(window.location.search); }
        function goNext() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) { alert('Please select an option.'); return; }
            const params = getUrlParams();
            const newIncident = selected.value;
            params.set('incident', newIncident); // override original incident
            // Redirect to appropriate first pathway page based on new selection
            let nextPage = '';
            switch(newIncident) {
                case 'A': nextPage = 'A1.html'; break;
                case 'B': nextPage = 'B1.html'; break;
                case 'C': nextPage = 'C1.html'; break;
                case 'D': nextPage = 'D1.html'; break;
                default: nextPage = '../results.html'; break;
            }
            window.location.href = nextPage + '?' + params.toString();
        }
    </script>
</body>
</html>
