<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2 - Blockchain | XRPD Fraud Recovery</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .trust-strip { background-color: #222; padding: 8px; text-align: center; font-size: 14px; color: #ccc; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .progress { display: flex; justify-content: space-between; margin: 20px 0 10px; font-size: 14px; color: #888; }
        .progress .active { color: #3A95FF; font-weight: bold; }
        .progress-bar { background-color: #333; height: 6px; border-radius: 3px; margin-bottom: 30px; }
        .progress-fill { background-color: #3A95FF; height: 6px; width: 33%; border-radius: 3px; }
        h2 { font-size: 24px; margin-bottom: 10px; }
        .subtitle { color: #aaa; margin-bottom: 20px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option { display: block; padding: 10px; background-color: #111; border: 1px solid #333; border-radius: 6px; cursor: pointer; }
        .option:hover { border-color: #3A95FF; }
        .option input { margin-right: 8px; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn { padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-block; }
        .btn-outline { background: transparent; border: 1px solid #3A95FF; color: #3A95FF; }
        .btn-primary { background: #3A95FF; color: #000; border: none; }
        .btn-primary:hover { background: #1a7ac4; }
    </style>
</head>
<body>
    <div class="trust-strip">⚠️ We never ask for seed phrase. No guaranteed recovery. Beware of upfront fees.</div>
    <div class="container">
        <div class="progress">
            <span class="active">1. Incident</span><span class="active">2. Chain</span><span>3. Wallet</span><span>4. Country</span><span>5. Loss</span><span>6. Police</span>
        </div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <h2>Which blockchain network was involved?</h2>
        <div class="subtitle">If you're not sure, pick "Not sure".</div>
        <div class="options-grid" id="options">
            <label class="option"><input type="radio" name="chain" value="eth"> Ethereum</label>
            <label class="option"><input type="radio" name="chain" value="bnb"> BNB Chain</label>
            <label class="option"><input type="radio" name="chain" value="sol"> Solana</label>
            <label class="option"><input type="radio" name="chain" value="btc"> Bitcoin</label>
            <label class="option"><input type="radio" name="chain" value="polygon"> Polygon</label>
            <label class="option"><input type="radio" name="chain" value="arb"> Arbitrum</label>
            <label class="option"><input type="radio" name="chain" value="avax"> Avalanche</label>
            <label class="option"><input type="radio" name="chain" value="op"> Optimism</label>
            <label class="option"><input type="radio" name="chain" value="xrp"> XRP</label>
            <label class="option"><input type="radio" name="chain" value="trx"> TRON</label>
            <label class="option" style="grid-column: span 2;"><input type="radio" name="chain" value="unknown"> Not sure / Other</label>
        </div>
        <div class="nav-buttons">
            <a href="step-1.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">Next →</button>
        </div>
    </div>
    <script>
        function goNext() {
            const selected = document.querySelector('input[name="chain"]:checked');
            if (!selected) { alert('Please select an option.'); return; }
            const urlParams = new URLSearchParams(window.location.search);
            const incident = urlParams.get('incident') || 'unknown';
            window.location.href = `step-3.html?incident=${incident}&chain=${selected.value}`;
        }
    </script>
</body>
</html>
