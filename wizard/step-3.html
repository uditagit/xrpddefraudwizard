<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 3 - Wallet Address | XRPD Fraud Recovery</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .trust-strip { background-color: #222; padding: 8px; text-align: center; font-size: 14px; color: #ccc; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .progress { display: flex; justify-content: space-between; margin: 20px 0 10px; font-size: 14px; color: #888; }
        .progress .active { color: #3A95FF; font-weight: bold; }
        .progress-bar { background-color: #333; height: 6px; border-radius: 3px; margin-bottom: 30px; }
        .progress-fill { background-color: #3A95FF; height: 6px; width: 50%; border-radius: 3px; }
        h2 { font-size: 24px; margin-bottom: 10px; }
        .subtitle { color: #aaa; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; background-color: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .skip-link { display: inline-block; margin-top: 12px; color: #3A95FF; text-decoration: none; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn { padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-block; }
        .btn-outline { background: transparent; border: 1px solid #3A95FF; color: #3A95FF; }
        .btn-primary { background: #3A95FF; color: #000; border: none; }
    </style>
</head>
<body>
    <div class="trust-strip">⚠️ We never ask for seed phrase. No guaranteed recovery. Beware of upfront fees.</div>
    <div class="container">
        <div class="progress">
            <span class="active">1. Incident</span><span class="active">2. Chain</span><span class="active">3. Wallet</span><span>4. Country</span><span>5. Loss</span><span>6. Police</span>
        </div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <h2>If you have it, paste the wallet address involved.</h2>
        <div class="subtitle">If you don't have it right now, you can skip this step.</div>
        <input type="text" id="wallet" placeholder="e.g. 0x1a2b3c... or skip" />
        <div><a href="#" id="skipLink" class="skip-link">Skip this step →</a></div>
        <div class="nav-buttons">
            <a href="step-2.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">Next →</button>
        </div>
    </div>
    <script>
        function getUrlParams() {
            return new URLSearchParams(window.location.search);
        }
        function buildBaseUrl() {
            const params = getUrlParams();
            return `step-4.html?incident=${params.get('incident') || 'unknown'}&chain=${params.get('chain') || 'unknown'}`;
        }
        document.getElementById('skipLink').href = buildBaseUrl() + '&wallet=skipped';
        function goNext() {
            const wallet = document.getElementById('wallet').value.trim();
            const walletParam = wallet ? `&wallet=${encodeURIComponent(wallet)}` : '&wallet=skipped';
            window.location.href = buildBaseUrl() + walletParam;
        }
    </script>
</body>
</html>
