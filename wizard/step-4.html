<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 4 - Country | XRPD Fraud Recovery</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .trust-strip { background-color: #222; padding: 8px; text-align: center; font-size: 14px; color: #ccc; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .progress { display: flex; justify-content: space-between; margin: 20px 0 10px; font-size: 14px; color: #888; }
        .progress .active { color: #3A95FF; font-weight: bold; }
        .progress-bar { background-color: #333; height: 6px; border-radius: 3px; margin-bottom: 30px; }
        .progress-fill { background-color: #3A95FF; height: 6px; width: 66%; border-radius: 3px; }
        h2 { font-size: 24px; margin-bottom: 10px; }
        .subtitle { color: #aaa; margin-bottom: 20px; }
        .option { display: block; margin-bottom: 12px; padding: 10px; background-color: #111; border: 1px solid #333; border-radius: 6px; cursor: pointer; }
        .option:hover { border-color: #3A95FF; }
        .option input { margin-right: 12px; }
        #other-country-container { margin-top: 16px; display: none; }
        #other-country { width: 100%; padding: 12px; background-color: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn { padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-block; }
        .btn-outline { background: transparent; border: 1px solid #3A95FF; color: #3A95FF; }
        .btn-primary { background: #3A95FF; color: #000; border: none; }
    </style>
</head>
<body>
    <div class="trust-strip">⚠️ We never ask for seed phrase. No guaranteed recovery. Beware of upfront fees.</div>
    <div class="container">
        <div class="progress">
            <span class="active">1. Incident</span><span class="active">2. Chain</span><span class="active">3. Wallet</span><span class="active">4. Country</span><span>5. Loss</span><span>6. Police</span>
        </div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <h2>Which country are you reporting from?</h2>
        <div class="subtitle">This helps us show the correct reporting link.</div>
        <div class="options" id="options">
            <label class="option"><input type="radio" name="country" value="US" onclick="hideOther()"> United States</label>
            <label class="option"><input type="radio" name="country" value="UK" onclick="hideOther()"> United Kingdom</label>
            <label class="option"><input type="radio" name="country" value="CA" onclick="hideOther()"> Canada</label>
            <label class="option"><input type="radio" name="country" value="AU" onclick="hideOther()"> Australia</label>
            <label class="option"><input type="radio" name="country" value="EU" onclick="hideOther()"> EU / Europe</label>
            <label class="option"><input type="radio" name="country" value="OTHER" onclick="showOther()"> Other</label>
        </div>
        <div id="other-country-container">
            <label for="other-country">Please enter your country:</label>
            <input type="text" id="other-country" placeholder="e.g. Japan, Brazil, ..." />
        </div>
        <div class="nav-buttons">
            <a href="step-3.html" class="btn btn-outline">← Back</a>
            <button onclick="goNext()" class="btn btn-primary">Next →</button>
        </div>
    </div>
    <script>
        function getUrlParams() {
            return new URLSearchParams(window.location.search);
        }
        function buildBaseUrl() {
            const params = getUrlParams();
            return `step-5.html?incident=${params.get('incident') || 'unknown'}&chain=${params.get('chain') || 'unknown'}&wallet=${params.get('wallet') || 'skipped'}`;
        }
        function showOther() { document.getElementById('other-country-container').style.display = 'block'; }
        function hideOther() { document.getElementById('other-country-container').style.display = 'none'; }
        function goNext() {
            const selected = document.querySelector('input[name="country"]:checked');
            if (!selected) { alert('Please select a country.'); return; }
            let countryValue = selected.value;
            if (selected.value === 'OTHER') {
                const otherInput = document.getElementById('other-country').value.trim();
                if (!otherInput) { alert('Please enter your country.'); return; }
                countryValue = otherInput;
            }
            window.location.href = buildBaseUrl() + `&country=${encodeURIComponent(countryValue)}`;
        }
    </script>
</body>
</html>
